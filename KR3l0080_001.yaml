  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0080_WYG_001-1a, image: WYG1040/WYG1040-0332c.png}
body:
  text: 山房隨筆元蔣正子撰辛稼軒帥浙東時晦菴南軒任倉憲使劉改之欲見辛不納二公為之地云某日公燕至後筵便坐君可來門者不納但喧爭之必可入既而改之如所教門外果喧譁辛問故門者以告辛怒甚二公因言改之豪傑也善賦詩可試納之改之至長揖公問能詩乎曰能時方進羊腰腎羮辛命賦之改之對寒甚願乞巵酒酒罷乞韻時飲酒手顫餘瀝流於懷因以流字為韻即吟云拔毫已付管城子爛首曽封關內侯死後不知身外物也隨樽酒伴風流辛大喜命共嘗此羮終席而去厚餽焉席散南軒邀至公廨置酒語之曰先君魏公一生公忠為國功厄於命來挽者竟無一篇得此意願君有作以發幽潛改之即賦一絶云背水未成韓信陳明星已隕武侯軍平生一㸃不平氣化作祝融峯上雲南軒為之墮淚今龍洲集中不見此二詩豈遺之邪又云稼軒守京口時大雪帥寮佐登多景樓改之敝衣曳履而前辛令賦雪以難字為韻即吟云功名有分平吳易貧賤無交訪戴難自此莫逆云李公山節汾州人也端平中朱湛盧復之使北展覲八陵引李與王仲偕南李初任鄉郡節制司幹官後任西山倅時正倅陳三嶼松龍㑹寮友於多景樓賞楊妃菊令諸妓各持紙筆侍衆官請詩李江下後至酒一行起背手數步吟云命委馬嵬坡畔泥驚魂飛上傲霜枝西風落日東籬下薄幸三郎知不知辭至精切或至閣筆西山張倅藝窗有繡養娘者命蒼頭遞一羅帕與館人劉啓之童偶遺之於地藝窗責劉即遣去劉作詩謝張云夜深檛鼓醉紅裙半世侯門熟稔聞自是東籬窺宋玉非關司馬挑文君蒼頭誤送香羅帕簧舌翻成貝錦文幸賴老成持定力一帆安穩過溪雲李邦美過句容之村鄉見酒肆粉壁明潔題云青裙白面閧挑菜茅舍竹籬疏見梅未及後聨店翁怒曰我以此壁為人塗汚方新之今爾又作俑也遂不書有客續至問翁翁悔之一日李再過之翁請足成李笑取筆書云春事隔年無信息一聲啼鳥喚將來往來知音皆愛之寶祐甲寅江東多虎有司行禬禳之典青詞末聨云雖曰寅年之足或有數存去其乙字之威尚祈神力蓋古詩有寅年足虎狼之句傳謂虎威如乙字對屬甚切京口韓香除夜請客作桃符云有客如擒虎無錢請退之以其姓為對也直北某州有道君題壁一詩云徹夜西風撼破扉蕭條孤館一燈微家山回首三千里目斷山南無鴈飛曽聞海上鐵斗膽猶見雲中金甲神乃陸樞密君實挽張郢州世傑詩也張公擁德祐景祥炎興於海上各擁兵南北岸一夕大風雨皆不利張覆舟而薨翌早獲尸棺殮焚化其膽如斗大而焚不化諸軍感慟忽雲中見金甲神人且云今天亡我關係不輕後身當出恢復矣此詩全篇不傳忠義英烈雖亡尤耿耿也僧本真號月湖半顛賦吳門上元云村翁看了上元歸正是西樓月落時誇道官衙好燈火不知渾爾㸃膏脂微聞於郡守吳退菴遂命住虎丘寺有刺夏金吾貴云節樓髙聳與雲平通國誰能有此榮一語淮西聞養老三更江上便抽兵不因賣國謀先定何事勤王詔不行縱有虎符髙一丈到頭難免賊臣名人謂北兵既至許貴以淮西一道與之養老故戢兵不戰然宋當國者處置失宜力詔貴及其子松上流䇿應又知正陽失利松已死不能無憾又俾受孫虎臣節制乃大不樂本無戰心況秋壑退師數十萬衆一鼓而潰夏雖勇健亦何為哉京口天慶觀主聶碧窗江西人嘗為龍翔宫書記北朝赦至感而有詩云乾坤殺氣正沈沈又聽燕臺降德音萬口盡傳新詔好四朝誰念舊恩深分茅列土將軍志問舍求田老父心麗正押班猶昨日小臣無語淚霑襟又哀被虜婦云當年結髮在深閨豈料人生有别離到底不知因色誤馬前猶自買胭脂又詠北婦云雙栁垂鬟别樣梳醉從馬上倩人扶江南有眼何曽見爭捲珠簾看鷓鴣觀中有趙太祖真容北來者見必拜聶因題其上云鳳表龍姿儼若新一回展卷一傷神天顔亦怪君非敵河北山東總舊君梁棟隆吉題茅峯云杖藜絶頂窮追尋青山世界開嶇嶔碧雲未斷天外眼春風先吹人間心大君升天寶劍化小龍入海明珠沈何人更守𤣥帝鼎有客欲問秦皇金顛崖誰念受辛苦古洞未易尋幽深神光不破黑暗惱山鬼空作離騷吟安得長松撑日月華陽世界收層隂長嘯一聲下山去草木為我留清音隆吉以戊辰登科任仁和尉老依元符宫宗師許道杞許甚禮之且賙其家梁好嘲罵衆道士惡之遂箋此詩告官以譏時逮捕金陵備嘗笞楚卒得免亦終不偶而殂吳履齊開慶之變再入相四明士子上詩來則非邪抑是邪緣堤何必更行沙瑟當調處難膠柱棋到危時見作家公論有誰能著腳事機至此轉聱牙不如疊嶂雙溪下行對青山坐看花言者附賈似道描畫彈劾貶循州而殂饒州士熊某嘲之云近來西北又干戈獨立斜陽感慨多雷為元城驅劫火天胡丁謂活鯨波九原難起先生死萬世其如公論何道過雕峯休插竹想逢宗老續長歌菊巖季苾祭以文曰潞公不能不疏溫公不能不毁趙忠簡不能不遷冦萊公不能不死爾民無福豈天奪之我士無祿豈天厭之嗚呼後世而無先生者乎孰能志之後世而有先生者乎孰能待之永嘉余德鄰宗文與聶碧窗奕棋余屢北有賣地仙丹者國手也余呼之至紿聶云某有僕能棋欲試數著不敢聶俾對枰連敗數局余自內以片紙書十字可憐道士碧不識地仙丹聶大笑曰吾固疑其不凡三山林觀過年七嵗嬉遊市中以鬻詩自命或戲令詠轉失氣云視之不見名曰希聽之不聞名曰夷不啻若自其口出人皆掩鼻而過之林曽試神童科不甚達三衢留中齊甲辰大魁文山宋瑞丙辰大魁中齊作相身享富貴三十年仕北為尚書文山才登第丁父憂仕塗亦坎壈乙亥糾義兵勤王終以罔功患難中倚之為重雖云為相黃扉之貴萬鍾之奉無有也江西羅秋一詩云囓雪蘇郎受苦辛庾公老作北朝臣當年龍首黃扉客猶是衡門一樣人中齊物色將羅織之亟歸而免薛制機言有賀自長沙移鎮南昌者啓云夜醉長沙曉行湘水難教檣燕之留杜詩朝飛南浦暮捲西山來聽佩鸞之舞王勃又有賀除直祕閣依舊東江制置司幹辦公事云望玉宇瓊樓之邃何似人間從綸巾羽扇之游依然江表上已請客云三月三日長安水邊多麗人一觴一詠㑹稽山隂修禊事又云良辰美景賞心樂事四者難并崇山峻嶺茂林修竹羣賢畢至姚橘洲尹臨安時吳履齊拜相姚語諸客作啓賀之商量起句彭晉叟云轉鴻鈞運紫極萬化一新自龍首到黃扉百年幾見陳雲屋嘲翟兄之姓云失足如何躍無光耀不成若非身倚木為櫂亦難行時翟館水南楊氏蓋嘲其倚楊也莫兩山傷丁氏故基題一絶於太虛堂疏雨斑斑灑葉舟前山喚客作清游芳華消歇春歸後野草荒田一片愁文本心典淮郡蕭條之甚謝賈相啓中云人家如破寺十室九空太守若頭陀兩粥一飯蔣復軒鑷白髮詩云勸君休鑷鬢毛髮鬢到斑時已自難多少朱門少年子業風吹上北邙山杜氏婦作北行詩江南幼女别鄉閭一似昭君出塞圖默默一身離故國區區千里逐狂夫慵拈簫管吹羌曲懶繫羅裙舞鷓鴣多少眼前悲泣事不如花栁舊江都此等多有戲作題之驛亭以為美談許平仲衡學問文藝為世所尊稱為夫子人目為許先生養志不仕有辭召命詩云一天雷雨誠堪畏千載風雲謾企思留取閒身卧田舍靜看蝴蝶挂蛛絲可以觀其志矣一號魯齊張文簡雪詩銀簷不雨溜常滴玉樹無風花自開其家集不收盧梅坡詠梅開一花詩云昨夜花神有底忙先教踏白入南邦冷將雙眼窺春破肯把苦心受雪降樊弟得兄呼最長竹君取友嘆無雙試於月夜忩前看一在枝頭一在忩杜善甫山東名士工詩文不屑仕進游嚴相之門嚴乃濟南望族善甫為所敬重一日讒者間之情分浸乖杜謝以詩云髙卧東忩興已成簾鈎無復挂冠聲十年恩愛淪肌髓只說嚴家好弟兄嚴悟非其過款密如初時有掌兵官逺戍於外其妻宴客笙歌終夕善甫詩曰髙燒銀燭照雲鬟沸耳笙歌徹夜䦨不念征西人萬里玉關霜重鐵衣寒聞者快之有薦之於朝遂召之表謝不赴中二聨云俾獻言於乞言之際敢盡其忠若求仕於致仕之年恐無此理不能為白居易漫法香山居士之名惟願學陸龜蒙拜賜江湖散人之號豫分教溧陽一候士過求宿學舍士游山東甚久為余道其辭甚多僅記此楊煥然號關西夫子題孔子廟㑹見春風入杏壇奎文閣上獨憑欄淵源自古尊洙泗祖述何人似孟韓竹簡不隨秦火冷楷衣髙倚魯城寒漂零踪跡千年後無分東家寄一簞又党懷英詩魯國遺踪隨渺茫獨餘林廟壓城荒梅梁映曙霞分影松牖回春月轉光老檜曽霑周雨露斷碑猶是漢文章不須更問𫝊家久泰嶽參天汾水長党承安間人工書嘗作杏壇二字刻於祖庭翟惠父詠鬼門關盤盤重險壓三塗慘慘隂靈怖萬夫青海戰魂來守鑰黃塵行客過張弧西風古道悲羸馬落日荒山嘯老狐年少文人今白首小猖休苦笑揶揄惠父北人閻子靜復至元間翰林學士後亷訪浙西有梅杖詩云凍盡西湖萬玉柯春風入手重摩挲較量龍竹能香否比並鳩藤奈白何聲破夢寒霜滿戶影隨詩瘦月橫坡只知功到調羮盡不道扶顛力更多元遺山好問裕之北方文雄也其妹為女冠文而艷張平章當揆欲娶之使人囑裕之辭以可否在妹妹以為可則可張喜自往訪覘其所向至則方自手補天花板輟而迎之張詢近日所作應聲答曰補天手段暫施張不許纎塵落畫堂寄語新來雙燕子移巢别處覔雕梁張悚然而出劉山翁汝進漫塘幼子學問宏深文字典雅與客九日遊龍山以塵世難逢開口笑分韻翁得口字云縱步龍山巔放舟龍蕩口羣然鴈鶩行雜之牛馬走我拙不能詩我病不能酒試問賞花人還有菊花否衆服其工諸信齊誦此金國南遷後國浸弱不支又遷睢陽某后不肯播遷寧死於汴元遺山曰桃李深宫二十年更將顔色向誰憐人生只合梁園死金水河邊好墓田至元戊寅己卯間有董恢者江陵人後居太原任丁角酒稅副使僦屋以居詩云白髮蒼頭一腐儒行無轍跡住無廬鄧林萬頃青青木肯為鷦鷯借一株又翠閣朱樓鎖掩扉尋巢燕子不能歸落花吹面東風雨繞遍芳簷無處依漫塘先生與客燕坐指忩外櫻桃唯一實共以為笑忽一客來訪自言能詩因命賦之云燒丹道士藥爐空枉費先生九轉功一粒丹砂尋不見曉來枝上弄春風衆咸喜之周芝田浙人浪跡江湖道冠野服詩酒諧笑略無拘檢亦時出小戲以悅人而不知其能琴與詩也遇琴則一彈適興則吟一二句而不終篇嘗賦石上兩竹云淋漓滿腹藏春雨突兀半拳生曉雲亦自可人又草香花落後雲黑雨來時琴詩云膝上橫陳玉一枝此音唯獨此心知夜深斷送鶴先睡彈到空山月落時遨溪張復題雨竹圖云涓涓而淨森森而立孟宗倚之淚痕猶濕風竹圖云可屈者氣不屈者節故人之來盡掃秋月皆有思致趙靜齊淮被執於溧陽豐登莊至北府辭家廟云祖父有功王室德澤霑及子孫今淮計窮被執誓以一死報君刀鋸置之不問萬折忠義常存急告先靈速引庶幾不辱家門即登棹船發至瓜洲被刑無有敢埋其尸者有一寵姬在焦僉省處此姬啓僉省云趙四知府今日已死矣妾元是他婢子望相公以妾之故許妾將尸焚化也是相公一段隂隲事焦許之乃作一棺焚之又啓收骨撒之於水亦從之遂以裙盛骨殖到江邊大慟投江而死又聞其孫享祭靜齊降筆云生居四代將門家不幸遭逢被敵拏死在瓜洲無葬地幽魂夜夜到長沙其兄氷壺溍自京口遷金陵北兵至棄家而遁南徙不返死葬海旁山上吳門有吏娶一娼燕客歌舞徹旦明日犯事決配九江與婦泣别登舟盧梅坡詩云昨夜笙歌燕畫樓明朝揮淚送行舟當初嫁作商人婦無此江頭一段愁一户曹之妻與太守有私府學一士子知其事戶曹任滿將去守招其夫婦飲士子作祝英臺近付妓令歌之抱琵琶臨别語把酒淚如洗似恁春時倉卒去何意牡丹恰則開園荼䕷厮勾便下得一帆千里好無謂復道明日行呵如何戀得你一葉船兒休要更沈醉後梅子青時楊花飛絮側耳聽喜鵲哩守與此婦俱墮淚其夫不悟靈𨼆寺主僧元肇號淮海寺有松大數十圍史相當軸遣人伐松松與月波亭相對僧作詩云大夫去作棟梁材無復清隂覆緑苔惆悵月波亭上望夜深惟見鶴歸來穆陵在御閻貴妃父良臣起香火功德院欲勝靈竺乃伐鄰松供屋材僧作詩曰不為栽松種茯苓秪緣山色四時青老僧不惜擕將去留與西湖作畫屏詩徹於上遂命勿伐又山中有寺基久圮勢家規其地營葬僧亦有詩刺之一定空山已有年不須惆悵起頽磚道旁多少麒麟塜轉眼無人送紙錢遂不復取吉州羅西林集近詩刋一士囊詩及門一童橫卧棖䦨間良久喚童起曰將見汝主人求刋詩童曰請先與我一觀我以為可則為公達客怪之曰汝欲觀吾詩汝必能吟請賦一詩當示汝童請題客曰但以汝適來睡起搔首意為之童即吟曰夢跨青鸞上碧虛不知身世是華胥起來搔首渾無事啼鳥一聲春雨餘客駭伏同入見西林款之數日取其菊詩云不逐春風桃李妍秋風收拾短籬邊如何枝上金無數不與淵明當酒錢童乃羅之子也南康建昌縣有神童山每大比試童子至百人七取其一有鄧文龍年八嵗頴出諸童子右方嶽巨山守南康欲祝為子父謂之曰汝豫所鍾愛太守固欲祝汝將若何文龍曰第許之巨山一日招諸名士如馮紫山深居兄弟者而鄧父子與焉席上太守及諸公祗服褙子文龍以緑袍居座末坐定供茶文龍故以托子墮地諸公戲以失禮文龍曰先生衩衣學生落托衆為一笑酒酣巨山戲曰口紅衣緑如鸚鵡文龍應曰頭白形烏似老鴉又令賦君子竹即詠曰瀟湘子猷宅平將風月分兩軒渾似我一日可無君衆異之後易名元觀年十五領鄉薦登上第僧德豐三山人有重陽詩云戰盡今秋見太平西風多作北風聲不吹烏帽吹氊帽籬下黃花笑不成鍾山長老舉以自代答云耿耿孤吟對古梅忽𫝊軍將送書來倚崖枯木摧殘甚虛負陽和到一回竟不赴賈秋壑敗師亡國後有人刺以詩曰深院無人草已荒漆屏金字尚輝煌秪知事去身宜去豈料人亡國亦亡理考發身端自有鄭人應夢果何祥卧龍不肯留渠住空使晴光滿畫牆又云事到窮時計亦窮此行難倚鄂州功木綿菴上千年恨秋壑堂中一夢空石砌苔稠猿步月松庭葉落鳥呼風客來未用多惆悵試向吳山望故宫又傷西樓詩云檀板歌殘陌上花過牆荆棘刺簷牙指麾已失鐵如意賜與寧存玉辟邪破屋春歸無主燕壞池雨産有官蛙木綿菴外尤愁絶月黑夜深聞鬼車有人和云榮華富貴等浮花膂力難為國爪牙漢世秪知光擁立唐朝誰識杞姦邪綺羅化作春風蝶絃管翻成夜雨蛙縱有清漳人百死碧天難挽紫雲車秋壑出處本末自有知者兹不書秋壑在朝有術者言平章不利姓鄭之人因此每有此姓為官者多困抑之武學生鄭虎臣登科輒以罪配之後遇赦得還秋壑喪師陳靜觀諸公欲置之死地遂尋其平日極仇者監押虎臣遂請身為之乃假以武功大夫押其行虎臣一路凌辱至漳州木綿菴病泄㵼踞虎子欲絶虎臣知其服腦子求死乃云好教作只恁地死遂躍數下而殂庚申履齊吳相循州安置以賈似道私憾之故未幾除承節郎劉宗申知循州劉江湖士專以口舌嚇迫當路要人貨賄官爵士大夫畏其口姑厚餽彌縫其得官亦由此守循之際似道欲其殺吳相宗申至郡所以捃托履齊者無所不至隨行吏僕以次並亡或謂置毒所居井中故飲水者皆患足軟而死履齊亦不免似道遭鄭虎臣之辱其時趙介如守漳賈門下客也宴虎臣於公舍介如欲客似道似道不可以讓虎臣口口稱天使惟謹虎臣不答似道遂坐於下介如察其有殺賈意命館人啓鄭且以辭挑之於時似道衣服飲食皆為鄭减抑介如作錦衣等餽之見其行李輜重令截寄其處伺得命放回日取之其館人語鄭云天使今日押使至此度必無生理曷若令速殞免受許多苦惱鄭即云便是這物事受得這苦欲死而不死未幾遂殞趙往哭鄭不許趙固爭鄭怒云汝欲檢我邪趙云汝也直得一檢然末如之何趙經紀棺斂且致祭其辭云嗚呼履齊死循死於宗申先生死閩死於虎臣嗚呼云云祗此四句然哀激之悃無往不復之微意悉寫其中季一山闡為郡學正為豫道之似道敗後有題其養樂園曰老壑曽居葛嶺西游人誰敢問蘇堤勢將覆餗不回首事到出師方噬臍廢圃久無人作主敗垣唯有客留題算來秪有孤山耐依舊梅花片月低養樂者以其奉母而樂也其賜第正在蘇堤葛嶺孤山之近游人常盛自賈據此有游騎過其門必為偵事者察報每為所羅織有官者被黜有財者被禍逮世變而後已有人葛嶺二詩云當年誰敢此經過相國門前衛士多諸葛功名猶未滿周公事業竟如何雕梁雨蠧藏狐鼠花礎雲蒸長薜蘿萬死莫酬亡國恨空留遺跡在山阿又樓臺突兀妓成圍正是襄樊失援時王氣暗隨檀板歇江聲流入玉簫悲姓名不在功臣傳家廟徒存御賜碑誤國誤民還自誤滿庭秋草露垂垂山房隨筆
