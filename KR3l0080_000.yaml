body:
  text: 山房隨筆小説家類一雜事之屬提要臣等謹案山房隨筆一卷舊本題元全愚蔣正子撰不知何許人惟書中杜善甫一條內有余分教溧陽語知嘗為溧陽學官又有穆陵在御語知為宋人入元者也所記多宋末元初之事而于賈似道事尤再三深著其罪於鄭虎臣木棉菴事敘述始末亦比他書為最詳惟所記陸秀夫挽張世傑詩似出附會崖山舟覆鯨海沸騰烏有吟咏之暇且詩中曽聞海上鐵斗膽句亦不似同時之語朱國禎湧幢小品謂世傑溺死在秀夫赴海之後亦以此詩為疑所言良允殆好事者欲褒忠義故造作斯言至於以夏貴之降元歸咎似道未為無理而反復解釋似于貴反有恕詞未免有乖于大義讀者不以詞害意可矣乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:751a8d58c4ceeffa7ec502260fd12353a6a830842b346f9745c91d79a62a6d82
